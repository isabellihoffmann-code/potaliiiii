<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle IoT</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0a0e1a, #1a1f35);
            padding: 20px;
            color: #e2e8f0;
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 30px;
            max-width: 1000px;
            width: 100%;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        h1 {
            color: #60a5fa;
            font-size: 24px;
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
        }

        .status {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 16px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.05);
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
        }

        .dot.sync {
            background: #f59e0b;
            animation: pulse 1.5s infinite;
        }
        .dot.online {
            background: #10b981;
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.3);
        }
        .dot.offline {
            background: #ef4444;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }

        .status-text {
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
        }

        .topic-area {
            margin-bottom: 20px;
        }

        .topic-label {
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: block;
            margin-bottom: 5px;
        }

        .topic-input {
            width: 100%;
            padding: 10px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: white;
            font-size: 14px;
            outline: none;
        }

        .topic-input:focus {
            border-color: #3b82f6;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
        }

        .led-label {
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .led-circle {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin: 15px auto;
            transition: all 0.5s;
            background: #1a1f35;
            box-shadow: inset 0 4px 8px rgba(0, 0, 0, 0.5);
        }

        .led-circle.on-blue {
            background: radial-gradient(circle at 35% 35%, #60a5fa, #2563eb);
            box-shadow: 0 0 30px rgba(59, 130, 246, 0.5);
            animation: glow-blue 2s infinite;
        }

        .led-circle.on-green {
            background: radial-gradient(circle at 35% 35%, #4ade80, #16a34a);
            box-shadow: 0 0 30px rgba(74, 222, 128, 0.5);
            animation: glow-green 2s infinite;
        }

        @keyframes glow-blue {
            0%, 100% { box-shadow: 0 0 30px rgba(59, 130, 246, 0.5); }
            50% { box-shadow: 0 0 50px rgba(59, 130, 246, 0.8); }
        }

        @keyframes glow-green {
            0%, 100% { box-shadow: 0 0 30px rgba(74, 222, 128, 0.5); }
            50% { box-shadow: 0 0 50px rgba(74, 222, 128, 0.8); }
        }

        .led-status {
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            margin-bottom: 12px;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .btn {
            padding: 10px 24px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            flex: 1;
            min-width: 80px;
        }

        .btn:active {
            transform: scale(0.95);
        }
        .btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .btn-on-blue {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
        }
        .btn-on-blue:hover:not(:disabled) {
            box-shadow: 0 4px 20px rgba(59, 130, 246, 0.4);
            transform: translateY(-2px);
        }

        .btn-on-green {
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: white;
        }
        .btn-on-green:hover:not(:disabled) {
            box-shadow: 0 4px 20px rgba(34, 197, 94, 0.4);
            transform: translateY(-2px);
        }

        .btn-off {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white;
        }
        .btn-off:hover:not(:disabled) {
            box-shadow: 0 4px 20px rgba(239, 68, 68, 0.4);
            transform: translateY(-2px);
        }

        /* Bargraph */
        .bargraph-wrap {
            width: 100%;
            margin: 10px 0;
        }

        .bargraph-track {
            width: 100%;
            height: 24px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .bargraph-fill {
            height: 100%;
            border-radius: 12px;
            transition: width 0.3s ease;
            background: linear-gradient(90deg, #f59e0b, #f97316, #ef4444);
            width: 0%;
        }

        .bargraph-labels {
            display: flex;
            justify-content: space-between;
            color: rgba(255, 255, 255, 0.3);
            font-size: 11px;
            margin-top: 4px;
        }

        .bargraph-value {
            color: #f59e0b;
            font-size: 28px;
            font-weight: 700;
            margin: 5px 0;
        }

        .pot-info {
            color: rgba(255, 255, 255, 0.4);
            font-size: 12px;
            margin-top: 5px;
        }

        .badge {
            display: inline-block;
            padding: 2px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
            margin-top: 5px;
        }

        @media (max-width: 640px) {
            .container {
                padding: 20px;
            }
            h1 {
                font-size: 20px;
            }
            .grid {
                grid-template-columns: 1fr;
            }
            .led-circle {
                width: 60px;
                height: 60px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Header -->
        <div class="header">
            <div>
                <h1>💡 Controle IoT</h1>
                <div class="subtitle">LED 13, LED 12 e PWM com Potenciômetro</div>
            </div>
            <div class="status">
                <span class="dot sync" id="dot"></span>
                <span class="status-text" id="statusText">Sincronizando...</span>
            </div>
        </div>

        <!-- Tópico -->
        <div class="topic-area">
            <label class="topic-label">📡 Tópico MQTT</label>
            <input class="topic-input" id="topicInput" value="gerry_sanchez_led_exclusivo/arduino">
        </div>

        <!-- Grid -->
        <div class="grid">
            <!-- LED 13 -->
            <div class="card">
                <div class="led-label">🔵 LED 13</div>
                <div class="led-circle" id="led13"></div>
                <div class="led-status" id="status13">💤 Inativo</div>
                <div class="btn-group">
                    <button class="btn btn-on-blue" id="on13" disabled>Ligar</button>
                    <button class="btn btn-off" id="off13" disabled>Desligar</button>
                </div>
            </div>

            <!-- LED 12 -->
            <div class="card">
                <div class="led-label">🟢 LED 12</div>
                <div class="led-circle" id="led12"></div>
                <div class="led-status" id="status12">💤 Inativo</div>
                <div class="btn-group">
                    <button class="btn btn-on-green" id="on12" disabled>Ligar</button>
                    <button class="btn btn-off" id="off12" disabled>Desligar</button>
                </div>
            </div>

            <!-- LED PWM -->
            <div class="card">
                <div class="led-label">🟡 LED PWM (Pino 9)</div>
                <div class="led-circle" id="ledPwm"></div>
                <div class="led-status" id="statusPwm">0%</div>

                <div class="bargraph-wrap">
                    <div class="bargraph-track">
                        <div class="bargraph-fill" id="bargraph"></div>
                    </div>
                    <div class="bargraph-labels">
                        <span>0%</span>
                        <span>50%</span>
                        <span>100%</span>
                    </div>
                    <div class="bargraph-value" id="pwmValue">0%</div>
                </div>

                <div class="pot-info">🎛️ Potenciômetro no pino A0</div>
                <div class="badge">📊 AO VIVO</div>
                <div class="pot-info" id="potValue">Valor analógico: 0</div>
            </div>
        </div>

        <div style="text-align:center;margin-top:20px;color:rgba(255,255,255,0.2);font-size:12px;border-top:1px solid rgba(255,255,255,0.05);padding-top:15px;">
            MQTT via HiveMQ • WebSockets Seguros (8884)
        </div>
    </div>

    <script>
        // ==========================================
        // CONFIGURAÇÕES
        // ==========================================
        const BROKER = 'broker.hivemq.com';
        const PORT = 8884;
        let TOPIC = 'gerry_sanchez_led_exclusivo/arduino';

        // ==========================================
        // DOM
        // ==========================================
        const dot = document.getElementById('dot');
        const statusText = document.getElementById('statusText');
        const topicInput = document.getElementById('topicInput');

        const led13 = document.getElementById('led13');
        const led12 = document.getElementById('led12');
        const ledPwm = document.getElementById('ledPwm');
        const status13 = document.getElementById('status13');
        const status12 = document.getElementById('status12');
        const statusPwm = document.getElementById('statusPwm');
        const bargraph = document.getElementById('bargraph');
        const pwmValue = document.getElementById('pwmValue');
        const potValue = document.getElementById('potValue');

        const on13 = document.getElementById('on13');
        const off13 = document.getElementById('off13');
        const on12 = document.getElementById('on12');
        const off12 = document.getElementById('off12');

        // ==========================================
        // ESTADO
        // ==========================================
        let client = null;
        let connected = false;

        // ==========================================
        // FUNÇÕES UI
        // ==========================================
        function setStatus(status, msg) {
            dot.className = 'dot';
            if (status === 'sync') {
                dot.classList.add('sync');
                statusText.textContent = 'Sincronizando...';
            } else if (status === 'online') {
                dot.classList.add('online');
                statusText.textContent = 'Online';
            } else if (status === 'offline') {
                dot.classList.add('offline');
                statusText.textContent = 'Offline';
            }
        }

        function setLED13(on) {
            led13.className = 'led-circle';
            led13.classList.add(on ? 'on-blue' : '');
            status13.textContent = on ? '🔆 Ativo' : '💤 Inativo';
            status13.style.color = on ? '#60a5fa' : 'rgba(255,255,255,0.6)';
        }

        function setLED12(on) {
            led12.className = 'led-circle';
            led12.classList.add(on ? 'on-green' : '');
            status12.textContent = on ? '🔆 Ativo' : '💤 Inativo';
            status12.style.color = on ? '#4ade80' : 'rgba(255,255,255,0.6)';
        }

        function setPWM(valor, percent, analog) {
            // Atualiza círculo
            if (valor === 0) {
                ledPwm.className = 'led-circle';
                ledPwm.style.background = '#1a1f35';
                ledPwm.style.boxShadow = 'inset 0 4px 8px rgba(0,0,0,0.5)';
            } else {
                ledPwm.className = 'led-circle';
                const intensity = 0.3 + (valor / 255) * 0.7;
                const r = Math.round(245 * intensity);
                const g = Math.round(158 * intensity);
                const b = Math.round(11 * intensity);
                ledPwm.style.background = `radial-gradient(circle at 35% 35%, rgba(${r},${g},${b},0.8), rgba(${r},${g},${b},1))`;
                ledPwm.style.boxShadow = `0 0 ${30 + percent}px rgba(245,158,11,${0.3 + percent/200})`;
            }

            // Atualiza bargraph
            bargraph.style.width = percent + '%';
            pwmValue.textContent = percent + '%';
            statusPwm.textContent = percent + '%';

            // Atualiza potenciômetro
            if (analog !== undefined) {
                potValue.textContent = 'Valor analógico: ' + analog + ' (0-1023)';
            }
        }

        function setButtons(enabled) {
            on13.disabled = !enabled;
            off13.disabled = !enabled;
            on12.disabled = !enabled;
            off12.disabled = !enabled;
        }

        // ==========================================
        // MQTT
        // ==========================================
        function generateClientId() {
            return 'web_' + Math.random().toString(36).substring(2, 10) + '_' + Date.now().toString(36);
        }

        function connect() {
            const clientId = generateClientId();
            client = new Paho.MQTT.Client(BROKER, PORT, clientId);

            client.onConnectionLost = function() {
                connected = false;
                setStatus('offline', 'Offline');
                setButtons(false);
                setTimeout(connect, 5000);
            };

            client.onMessageArrived = function(msg) {
                const payload = msg.payloadString.trim();
                console.log('📨 Recebido:', payload);

                // LED13
                if (payload === 'LED13:1') {
                    setLED13(true);
                } else if (payload === 'LED13:0') {
                    setLED13(false);
                }
                // LED12
                else if (payload === 'LED12:1') {
                    setLED12(true);
                } else if (payload === 'LED12:0') {
                    setLED12(false);
                }
                // PWM
                else if (payload.startsWith('PWM:')) {
                    const parts = payload.split(':');
                    if (parts.length === 4) {
                        const valor = parseInt(parts[1]);
                        const percent = parseInt(parts[2]);
                        const analog = parseInt(parts[3]);
                        setPWM(valor, percent, analog);
                    }
                }
            };

            const options = {
                useSSL: true,
                timeout: 10,
                onSuccess: function() {
                    connected = true;
                    setStatus('online', 'Online');
                    setButtons(true);
                    client.subscribe(TOPIC);
                    console.log('📡 Inscrito em:', TOPIC);
                },
                onFailure: function() {
                    connected = false;
                    setStatus('offline', 'Offline');
                    setButtons(false);
                    setTimeout(connect, 5000);
                }
            };

            client.connect(options);
        }

        function publish(command) {
            if (!connected || !client) {
                console.warn('❌ Não conectado');
                return;
            }
            const msg = new Paho.MQTT.Message(command);
            msg.destinationName = TOPIC;
            msg.qos = 1;
            client.send(msg);
            console.log('📤 Enviado:', command);
        }

        // ==========================================
        // EVENTOS
        // ==========================================
        on13.addEventListener('click', () => publish('LED13:1'));
        off13.addEventListener('click', () => publish('LED13:0'));
        on12.addEventListener('click', () => publish('LED12:1'));
        off12.addEventListener('click', () => publish('LED12:0'));

        topicInput.addEventListener('change', function() {
            const novo = this.value.trim();
            if (novo && novo !== TOPIC) {
                TOPIC = novo;
                localStorage.setItem('mqtt_topic', novo);
                if (connected && client) {
                    try { client.unsubscribe(TOPIC); } catch (e) {}
                    client.subscribe(TOPIC);
                }
                console.log('📡 Tópico alterado:', TOPIC);
            }
        });

        // ==========================================
        // INICIALIZAÇÃO
        // ==========================================
        const savedTopic = localStorage.getItem('mqtt_topic');
        if (savedTopic) {
            topicInput.value = savedTopic;
            TOPIC = savedTopic;
        }

        setLED13(false);
        setLED12(false);
        setPWM(0, 0);
        setStatus('sync', 'Sincronizando...');
        setButtons(false);

        connect();

        console.log('🚀 Sistema iniciado!');
        console.log('📡 Tópico:', TOPIC);
        console.log('💡 LED13: Botão ON/OFF');
        console.log('💡 LED12: Botão ON/OFF');
        console.log('🎛️ LED9 PWM: Controlado pelo potenciômetro');
    </script>

</body>
</html>
